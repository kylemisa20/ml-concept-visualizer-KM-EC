<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seq2Seq LSTM: Encoder-Decoder Visualization</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- KaTeX for LaTeX rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

  <style>
    .math-font { font-family: 'Cambria Math', 'Times New Roman', serif; }
    .svg-transition { transition: all 0.5s ease-in-out; }
    
    /* Flow Animations */
    .flow-active { stroke-dasharray: 8; animation: dashFlow 1s linear infinite; }
    @keyframes dashFlow { to { stroke-dashoffset: -16; } }
    
    /* Pulse Animations */
    @keyframes pulse-soft {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .active-cell { animation: pulse-soft 2s infinite; filter: brightness(1.05); }
    .inactive-cell { opacity: 0.4; filter: grayscale(80%); }
    
    .context-pulse { animation: contextGlow 2s infinite alternate; }
    @keyframes contextGlow {
      from { filter: drop-shadow(0 0 2px #ef4444); }
      to { filter: drop-shadow(0 0 10px #ef4444); }
    }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 font-sans min-h-screen pb-24">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Latex = ({ math, inline = true }) => {
      const html = katex.renderToString(math, { throwOnError: false, displayMode: !inline });
      return <span dangerouslySetInnerHTML={{ __html: html }} />;
    };

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [mode, setMode] = useState('inference'); // 'inference' or 'training'
      const [teacherForcing, setTeacherForcing] = useState(true);
      const [isStacked, setIsStacked] = useState(false);
      const [inputLength, setInputLength] = useState(2); // 2 or 3 words

      const MAX_STEPS = 7;

      // --- Dynamic Y-Coordinates (Shifted down further for extra clearance) ---
      const yOffset = 120; 

      const yInText = 500 + yOffset;
      const yInLine1 = 485 + yOffset, yInLine2 = 465 + yOffset;
      const yEmb = 435 + yOffset;
      const yEmbLine1 = 435 + yOffset, yEmbLine2 = 390 + yOffset;
      const yL1 = 310 + yOffset; 
      const yL1Line1 = 310 + yOffset, yL1Line2 = 260 + yOffset;
      const yL2 = 180 + yOffset;
      const yL2Line1 = 180 + yOffset, yL2Line2 = 130 + yOffset;
      const yFC = 100 + yOffset;
      const yFCLine1 = 100 + yOffset, yFCLine2 = 60 + yOffset;
      const ySM = 30 + yOffset;
      const ySMLine1 = 30 + yOffset, ySMLine2 = -10 + yOffset;
      const yOutText = -25 + yOffset;
      const yOutLabel = -45 + yOffset;

      // Auto-play logic
      useEffect(() => {
        let timer;
        if (isPlaying) {
          timer = setTimeout(() => {
            if (step < MAX_STEPS) {
              setStep(step + 1);
            } else {
              setIsPlaying(false);
            }
          }, 1500);
        }
        return () => clearTimeout(timer);
      }, [isPlaying, step]);

      const reset = () => { setStep(0); setIsPlaying(false); };
      const togglePlay = () => {
        if (step === MAX_STEPS) setStep(0);
        setIsPlaying(!isPlaying);
      };

      // --- Explanation Text ---
      const getStepExplanations = () => {
        const base = [
          { title: "Ready to Translate", desc: `Architecture: ${isStacked ? 'Stacked' : 'Single Layer'}. The model has fixed 3-slot pipelines for both Encoder and Decoder.` },
          { title: "Encoder: Step 1", desc: "Word 1 ('With') is processed. Memory starts building." },
          { title: "Encoder: Step 2", desc: "Word 2 ('You') is processed. Hidden and Cell states are updated horizontally." }
        ];

        // Encoder Padding
        if (inputLength === 3) {
          base.push({ title: "Encoder: Step 3", desc: "Word 3 ('Today') is processed. The full sentence is now 'read' into memory." });
        } else {
          base.push({ title: "Encoder: Step 3 (Padding)", desc: "Slot 3 is empty. We feed <PAD>. Masking ensures memory is simply copied forward without modification." });
        }

        base.push({ title: "The Context Vector", desc: `Final states are packaged into the Context Vector. This is the 'thought' passed to the Decoder.` });
        
        base.push({ title: "Decoder: Step 1", desc: "Decoder begins. Due to lack of training, it incorrectly predicts 'Hola' instead of 'Contigo'." });
        
        // Decoder Step 2
        let step6Desc = "";
        if (mode === 'inference') {
          step6Desc = inputLength === 2 
            ? "Inference (Context Aware): The model predicts <EOS> early because it received a short context. It is done!" 
            : "Inference: The error 'Hola' is fed back. The model predicts 'Amigo' as it tries to match the longer 3-word context.";
        } else {
          step6Desc = teacherForcing ? "Teacher Forcing: We ignore 'Hola' and feed the true target 'Contigo'. The model is forced back onto the path." : "Training: Without forcing, the 'Hola' error poisons the next step.";
        }
        base.push({ title: "Decoder: Step 2", desc: step6Desc });

        // Decoder Step 3
        if (inputLength === 3) {
          base.push({ title: "Decoder: Step 3", desc: "The model finally predicts <EOS>, signaling it is finished translating the 3-word input." });
        } else {
          let step7Desc = (mode === 'inference' || (mode === 'training' && !teacherForcing))
            ? "Decoder: Step 3 (Completion): Since the model hit <EOS> in the previous slot, this slot is now a NO-OP padding slot." 
            : "Decoder: Step 3 (Padding): Since the model correctly hit <EOS> in the last step, this final slot is now a <PAD>.";
          base.push({ title: "Decoder: Step 3", desc: step7Desc });
        }

        return base;
      };

      const stepExplanations = getStepExplanations();
      const isSelfFeeding = mode === 'inference' || (mode === 'training' && !teacherForcing);

      // --- SVG Helpers ---
      const SvgDefs = () => (
        <defs>
          <marker id="arrowH" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#475569" /></marker>
          <marker id="arrowC" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#16a34a" /></marker>
          <marker id="arrowContext" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#ef4444" /></marker>
          <marker id="arrowStandard" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#94a3b8" /></marker>
          <marker id="arrowFeedback" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#ef4444" /></marker>
          <marker id="arrowForcing" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#9333ea" /></marker>
        </defs>
      );

      const LSTMBox = ({ x, y, active, colorClass, label, isPad = false }) => (
        <g transform={`translate(${x}, ${y})`} className={`svg-transition ${active ? 'active-cell' : 'inactive-cell'} ${isPad ? 'opacity-30' : ''}`}>
          <rect x="0" y="0" width="80" height="80" rx="10" className={`fill-current ${colorClass} stroke-2 stroke-slate-400`} />
          <text x="40" y="45" textAnchor="middle" className="font-bold text-[10px] fill-slate-700">{isPad ? 'MASKED' : 'LSTM*'}</text>
          {label && <text x="40" y="20" textAnchor="middle" className="font-bold text-[8px] fill-slate-500 uppercase">{label}</text>}
          <line x1="0" y1="25" x2="80" y2="25" stroke="#16a34a" strokeWidth="2" strokeDasharray="2" opacity="0.5" />
          <line x1="0" y1="65" x2="80" y2="65" stroke="#475569" strokeWidth="2" strokeDasharray="2" opacity="0.5" />
        </g>
      );

      const LayerBox = ({ x, y, text, active, bgClass, borderClass, isPad = false }) => (
        <g transform={`translate(${x}, ${y})`} className={`svg-transition ${active ? 'opacity-100' : 'opacity-30'} ${isPad ? 'opacity-10 grayscale' : ''}`}>
          <rect x="-35" y="0" width="70" height="25" rx="6" className={`fill-current ${bgClass} stroke-2 ${borderClass}`} />
          <text x="0" y="16" textAnchor="middle" className="font-bold text-[9px] fill-white">{text}</text>
        </g>
      );

      return (
        <div className="max-w-6xl mx-auto p-6 md:p-10 space-y-12">
          <header className="border-b border-slate-200 pb-8 text-center md:text-left">
            <h1 className="text-4xl md:text-5xl font-black text-slate-900 mb-3 tracking-tight">Seq2Seq <span className="text-blue-600">Encoder-Decoder</span></h1>
            <p className="text-xl text-slate-500 font-medium">Interactive breakdown of machine translation with LSTMs and variable context.</p>
          </header>

          <section className="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 flex flex-col">
            <div className="flex flex-col lg:flex-row justify-between items-center gap-6 mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-100">
               <div className="flex items-center gap-3">
                 <button onClick={reset} className="px-4 py-2 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs flex items-center gap-1"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"></path></svg> Restart</button>
                 <button onClick={() => setStep(Math.max(0, step - 1))} className="p-2 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-700"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg></button>
                 <button onClick={togglePlay} className="px-6 py-2 rounded-full bg-blue-600 hover:bg-blue-700 text-white font-bold transition-all w-32 flex justify-center">{isPlaying ? "Pause" : "Play"}</button>
                 <button onClick={() => setStep(Math.min(MAX_STEPS, step + 1))} className="p-2 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-700"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg></button>
               </div>

               <div className="flex flex-col gap-2 min-w-[300px]">
                  <div className="flex justify-between items-center bg-white p-1 rounded-lg border border-slate-200 shadow-sm">
                    <button onClick={() => {setIsStacked(false); reset();}} className={`flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all ${!isStacked ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500'}`}>Single Layer</button>
                    <button onClick={() => {setIsStacked(true); reset();}} className={`flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all ${isStacked ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500'}`}>Stacked (Deep)</button>
                  </div>
                  <div className="flex justify-between items-center bg-amber-50 p-1 px-3 rounded-lg border border-amber-200">
                     <span className="text-[9px] font-bold text-amber-800 uppercase tracking-wider">Input Context:</span>
                     <div className="flex gap-2">
                        <button onClick={() => {setInputLength(2); reset();}} className={`px-2 py-0.5 rounded text-[9px] font-bold transition-all ${inputLength === 2 ? 'bg-amber-600 text-white shadow-sm' : 'text-amber-600 bg-white border border-amber-200'}`}>2 Words</button>
                        <button onClick={() => {setInputLength(3); reset();}} className={`px-2 py-0.5 rounded text-[9px] font-bold transition-all ${inputLength === 3 ? 'bg-amber-600 text-white shadow-sm' : 'text-amber-600 bg-white border border-amber-200'}`}>3 Words</button>
                     </div>
                  </div>
               </div>

               <div className="flex flex-col gap-2 min-w-[240px]">
                  <div className="flex items-center gap-2 bg-white p-1 rounded-lg shadow-sm border border-slate-200">
                    <button onClick={() => { setMode('inference'); setTeacherForcing(false); }} className={`flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all ${mode === 'inference' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-500'}`}>Inference</button>
                    <button onClick={() => setMode('training')} className={`flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all ${mode === 'training' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-500'}`}>Training</button>
                  </div>
                  {mode === 'training' && (
                    <div className="flex justify-between items-center bg-purple-50 p-1 px-3 rounded-lg border border-purple-200 animate-in fade-in">
                       <span className="text-[9px] font-bold text-purple-800 uppercase tracking-widest">Teacher Forcing:</span>
                       <button onClick={() => setTeacherForcing(!teacherForcing)} className={`relative inline-flex h-4 w-8 items-center rounded-full transition-colors ${teacherForcing ? 'bg-purple-600' : 'bg-slate-300'}`}><span className={`inline-block h-2.5 w-2.5 transform rounded-full bg-white transition-transform ${teacherForcing ? 'translate-x-5' : 'translate-x-0.5'}`} /></button>
                    </div>
                  )}
               </div>
            </div>

            <div className={`mb-8 p-6 border rounded-2xl min-h-[100px] transition-all duration-500 ${stepExplanations[step]?.title.includes("Padding") ? 'bg-amber-50 border-amber-200' : (isStacked ? 'bg-blue-50 border-blue-200' : 'bg-slate-50 border-slate-200')}`}>
               <h3 className="text-xl font-bold mb-2 text-slate-800 tracking-tight">{stepExplanations[step]?.title}</h3>
               <p className="text-sm leading-relaxed text-slate-600">{stepExplanations[step]?.desc}</p>
            </div>

            <div className="w-full overflow-x-auto flex justify-center">
              <div className="min-w-[950px] h-[720px] relative">
                <svg width="100%" height="100%" viewBox="0 0 950 720" className="font-sans">
                  <SvgDefs />
                  
                  {/* Background Zones (Height increased and labels positioned to avoid overlap) */}
                  <rect x="10" y="20" width="460" height="680" rx="20" fill="#fef08a" opacity="0.3" />
                  <text x="30" y="55" className="font-bold text-xl fill-yellow-700">Encoder</text>

                  <rect x="490" y="20" width="450" height="680" rx="20" fill="#e2e8f0" opacity="0.4" />
                  <text x="510" y="55" className="font-bold text-xl fill-slate-600">Decoder</text>

                  {/* Encoder Logic */}
                  {[1, 2, 3].map(i => {
                    const x = 30 + (i * 100);
                    const isStepActive = step >= i;
                    const isPad = i === 3 && inputLength === 2;
                    const word = i === 1 ? "With" : i === 2 ? "You" : isPad ? "<PAD>" : "Today";
                    
                    return (
                      <g key={i}>
                        <text x={x + 40} y={yInText} textAnchor="middle" className={`font-bold text-lg transition-opacity ${isStepActive ? (isPad ? 'fill-slate-400' : 'fill-slate-800') : 'fill-slate-200'}`}>{word}</text>
                        <line x1={x + 40} y1={yInLine1} x2={x + 40} y2={yInLine2} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isStepActive ? 'opacity-100' : 'opacity-0'}`} />
                        <LayerBox x={x + 40} y={yEmb} text="Embedding*" active={isStepActive} bgClass="text-blue-500" borderClass="border-blue-700" isPad={isPad} />
                        <line x1={x + 40} y1={yEmbLine1} x2={x + 40} y2={yEmbLine2} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isStepActive ? 'opacity-100' : 'opacity-0'}`} />
                        
                        <LSTMBox x={x} y={yL1} active={isStepActive} colorClass="text-yellow-200" label={isStacked ? "Layer 1" : ""} isPad={isPad} />
                        {isStacked && (
                          <g className={`svg-transition ${isStepActive ? 'opacity-100' : 'opacity-0'}`}>
                            <line x1={x + 40} y1={yL1} x2={x + 40} y2={yL1Line2} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={isStepActive && !isPad ? "flow-active" : ""} />
                            <LSTMBox x={x} y={yL2} active={isStepActive} colorClass="text-orange-200" label="Layer 2" isPad={isPad} />
                          </g>
                        )}
                        {i < 3 && (
                          <g className={`svg-transition ${step > i ? 'opacity-100' : 'opacity-0'}`}>
                            <line x1={x + 80} y1={yL1 + 25} x2={x + 100} y2={yL1 + 25} stroke="#16a34a" strokeWidth="2" markerEnd="url(#arrowC)" className="flow-active" />
                            <line x1={x + 80} y1={yL1 + 65} x2={x + 100} y2={yL1 + 65} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowH)" className="flow-active" />
                            {isStacked && (
                               <g>
                                  <line x1={x + 80} y1={yL2 + 25} x2={x + 100} y2={yL2 + 25} stroke="#16a34a" strokeWidth="2" markerEnd="url(#arrowC)" className="flow-active" />
                                  <line x1={x + 80} y1={yL2 + 65} x2={x + 100} y2={yL2 + 65} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowH)" className="flow-active" />
                               </g>
                            )}
                          </g>
                        )}
                      </g>
                    );
                  })}

                  {/* Context Vector */}
                  <g className={`svg-transition ${step >= 4 ? 'opacity-100' : 'opacity-0'}`}>
                    <line x1="410" y1={yL1 + 25} x2="520" y2={yL1 + 25} stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrowContext)" className="flow-active" />
                    <line x1="410" y1={yL1 + 65} x2="520" y2={yL1 + 65} stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrowContext)" className="flow-active" />
                    {isStacked && (
                      <g>
                        <line x1="410" y1={yL2 + 25} x2="520" y2={yL2 + 25} stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrowContext)" className="flow-active" />
                        <line x1="410" y1={yL2 + 65} x2="520" y2={yL2 + 65} stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrowContext)" className="flow-active" />
                      </g>
                    )}
                    <rect x="420" y={isStacked ? yL2 - 10 : yL1 - 10} width="80" height={isStacked ? 220 : 90} rx="10" fill="none" stroke="#ef4444" strokeWidth="2" strokeDasharray="4" className={step === 4 ? "context-pulse" : ""} />
                    <text x="460" y={isStacked ? yL2 - 20 : yL1 - 20} textAnchor="middle" className="font-bold text-[10px] fill-red-600">Context Vector</text>
                  </g>

                  {/* Decoder Logic (Steps 5, 6, 7) */}
                  {[5, 6, 7].map((s, idx) => {
                    const x = 520 + (idx * 140);
                    const isActive = step >= s;
                    const isLast = s === 7;
                    
                    let displayIn, displayOut;
                    let isPadSlot = false;

                    if (idx === 0) {
                      displayIn = "<SOS>"; displayOut = "Hola";
                    } else if (idx === 1) {
                      if (isSelfFeeding) {
                        displayIn = "Hola";
                        displayOut = (inputLength === 2) ? "<EOS>" : "Amigo";
                      } else {
                        displayIn = "Contigo";
                        displayOut = (inputLength === 2) ? "<EOS>" : "Hoy";
                      }
                    } else {
                      // Slot 3 (idx 2)
                      if (isSelfFeeding) {
                        if (inputLength === 2) {
                          displayIn = "<EOS>"; displayOut = "<PAD>"; isPadSlot = true;
                        } else {
                          displayIn = "Amigo"; displayOut = "<EOS>";
                        }
                      } else {
                        displayIn = (inputLength === 2) ? "<EOS>" : "Hoy";
                        displayOut = (inputLength === 2) ? "<PAD>" : "<EOS>";
                        isPadSlot = (inputLength === 2);
                      }
                    }

                    const isWrong = (idx === 0) || (idx > 0 && isSelfFeeding && displayOut !== "<EOS>" && !isPadSlot);

                    return (
                      <g key={s}>
                        <text x={x + 40} y={yInText} textAnchor="middle" className={`font-bold text-lg transition-opacity ${isActive ? (isPadSlot ? 'fill-slate-400' : isWrong ? 'fill-red-600' : 'fill-slate-800') : 'fill-slate-200'}`}>{displayIn}</text>
                        <line x1={x + 40} y1={yInLine1} x2={x + 40} y2={yInLine2} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isActive ? 'opacity-100' : 'opacity-0'}`} />
                        <LayerBox x={x + 40} y={yEmb} text="Embedding*" active={isActive} bgClass="text-blue-500" borderClass="border-blue-700" isPad={isPadSlot} />
                        <line x1={x + 40} y1={yEmbLine1} x2={x + 40} y2={yEmbLine2} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isActive ? 'opacity-100' : 'opacity-0'}`} />
                        
                        <LSTMBox x={x} y={yL1} active={isActive} colorClass="text-blue-100" label={isStacked ? "Layer 1" : `T=${idx+1}`} isPad={isPadSlot} />
                        {isStacked && (
                          <g className={`svg-transition ${isActive ? 'opacity-100' : 'opacity-0'}`}>
                            <line x1={x + 40} y1={yL1} x2={x + 40} y2={yL1Line2} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={isActive && !isPadSlot ? "flow-active" : ""} />
                            <LSTMBox x={x} y={yL2} active={isActive} colorClass="text-indigo-100" label="Layer 2" isPad={isPadSlot} />
                            <line x1={x + 40} y1={yL2} x2={x + 40} y2={yFC + 25} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={isActive && !isPadSlot ? "flow-active" : ""} />
                          </g>
                        )}
                        
                        {!isStacked && (
                          <line x1={x + 40} y1={yL1} x2={x + 40} y2={yFC + 25} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isActive ? 'opacity-100 flow-active' : 'opacity-0'}`} />
                        )}

                        <LayerBox x={x + 40} y={yFC} text="FC Layer*" active={isActive} bgClass="text-orange-400" borderClass="border-orange-600" isPad={isPadSlot} />
                        <line x1={x + 40} y1={yFC} x2={x + 40} y2={ySM + 25} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isActive ? 'opacity-100' : 'opacity-0'}`} />
                        <LayerBox x={x + 40} y={ySM} text="Softmax" active={isActive} bgClass="text-pink-400" borderClass="border-pink-600" isPad={isPadSlot} />
                        <line x1={x + 40} y1={ySM} x2={x + 40} y2={yOutText + 15} stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowStandard)" className={`svg-transition ${isActive ? 'opacity-100' : 'opacity-0'}`} />
                        
                        <g className={`svg-transition ${isActive ? 'opacity-100' : 'opacity-0'}`}>
                          <text x={x + 40} y={yOutText} textAnchor="middle" className={`font-black text-lg ${isPadSlot ? 'fill-slate-300' : isWrong ? 'fill-red-600' : 'fill-green-600'}`}>{displayOut}</text>
                        </g>

                        {/* Autoregressive Feedback paths */}
                        {idx === 0 && isSelfFeeding && (
                          <path d={`M ${x + 60} ${yOutText-5} C ${x + 160} ${yOutText-5}, ${x + 140} ${yInText-15}, ${x + 185} ${yInText-5}`} fill="none" stroke="#ef4444" strokeWidth="2" strokeDasharray="4" markerEnd="url(#arrowFeedback)" className={`svg-transition ${step >= 6 ? 'opacity-100 flow-active' : 'opacity-0'}`} />
                        )}
                        {idx === 1 && isSelfFeeding && inputLength === 3 && (
                          <path d={`M ${x + 60} ${yOutText-5} C ${x + 160} ${yOutText-5}, ${x + 140} ${yInText-15}, ${x + 185} ${yInText-5}`} fill="none" stroke="#ef4444" strokeWidth="2" strokeDasharray="4" markerEnd="url(#arrowFeedback)" className={`svg-transition ${step >= 7 ? 'opacity-100 flow-active' : 'opacity-0'}`} />
                        )}

                        {/* Horizontal flow */}
                        {!isLast && (
                          <g className={`svg-transition ${step > s ? 'opacity-100' : 'opacity-0'}`}>
                             <line x1={x + 80} y1={yL1 + 25} x2={x + 140} y2={yL1 + 25} stroke="#16a34a" strokeWidth="2" markerEnd="url(#arrowC)" className="flow-active" />
                             <line x1={x + 80} y1={yL1 + 65} x2={x + 140} y2={yL1 + 65} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowH)" className="flow-active" />
                             {isStacked && (
                               <g>
                                  <line x1={x + 80} y1={yL2 + 25} x2={x + 140} y2={yL2 + 25} stroke="#16a34a" strokeWidth="2" markerEnd="url(#arrowC)" className="flow-active" />
                                  <line x1={x + 80} y1={yL2 + 65} x2={x + 140} y2={yL2 + 65} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowH)" className="flow-active" />
                               </g>
                             )}
                          </g>
                        )}
                      </g>
                    );
                  })}

                  <g transform="translate(680, 40)">
                    <line x1="0" y1="15" x2="20" y2="15" stroke="#475569" strokeWidth="2" /><text x="25" y="19" className="text-[10px] fill-slate-600 font-bold">Hidden State (H)</text>
                    <line x1="0" y1="0" x2="20" y2="0" stroke="#16a34a" strokeWidth="2" /><text x="25" y="4" className="text-[10px] fill-slate-600 font-bold">Cell State (C)</text>
                  </g>
                  
                  {/* Footnote positioned at bottom of increased height box */}
                  <text x="20" y="705" className="font-bold text-[10px] fill-slate-400 italic text-center">* Weights shared horizontally. Decoder adjusts prediction length based on Encoder context vector.</text>
                </svg>
              </div>
            </div>
          </section>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 text-xs">
            <div className="bg-white p-8 rounded-3xl shadow-md border border-slate-200">
               <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg> Length Logic</h3>
               <p className="text-slate-600 leading-relaxed">Notice the difference in Inference mode when you toggle context length. With <strong>2 words</strong>, the model predicts &lt;EOS&gt; in Step 2. With <strong>3 words</strong>, it predicts &lt;EOS&gt; in Step 3.</p>
               <p className="mt-4 text-blue-800 font-bold italic">The Context Vector tells the Decoder whether to expect a long or short sentence.</p>
            </div>

            <div className="bg-white p-8 rounded-3xl shadow-md border border-slate-200">
               <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg> Padding vs. Done</h3>
               <p className="text-slate-600 leading-relaxed mb-3"><strong>&lt;EOS&gt;:</strong> The model explicitly generates this word to say "I'm finished translating."</p>
               <p className="text-slate-600 leading-relaxed"><strong>&lt;PAD&gt;:</strong> Used when the sentence ends before our architectural buffer (3 slots) is full. It is ignored during math updates.</p>
            </div>

            <div className="bg-slate-900 text-white p-8 rounded-3xl shadow-md border border-slate-700">
               <h3 className="text-lg font-bold text-orange-400 mb-4 flex items-center gap-2"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg> Context Summary</h3>
               <p className="text-slate-300 leading-relaxed">The Context Vector is the summary of the Encoder's state. It provides the "DNA" of the sentence. If that DNA says "this is a 3-word thought," the Decoder follows that pattern.</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
