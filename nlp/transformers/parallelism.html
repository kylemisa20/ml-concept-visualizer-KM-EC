<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallelism Strategies in Transformers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: default;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .strategy-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        .katex { color: #60a5fa; font-size: 1.1em; }
    </style>
</head>
<body class="flex h-screen w-screen text-slate-200">

    <!-- Left Control Panel -->
    <div class="glass-panel w-96 flex-shrink-0 flex flex-col h-full z-10 shadow-2xl relative">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Transformer Parallelism
            </h1>
            <p class="text-sm text-gray-400 mb-6">
                How we scale massive models across clusters of GPUs.
            </p>
            
            <div class="flex flex-col space-y-2">
                <button id="btn-data" class="strategy-btn active px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-semibold text-left transition-all border border-slate-700">
                    📦 Data Parallelism (DP)
                </button>
                <button id="btn-tensor" class="strategy-btn px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-semibold text-left transition-all border border-slate-700">
                    🧩 Tensor Parallelism (TP)
                </button>
                <button id="btn-pipeline" class="strategy-btn px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-semibold text-left transition-all border border-slate-700">
                    ⛓️ Pipeline Parallelism (PP)
                </button>
            </div>
        </div>

        <div class="p-6 flex-1 overflow-y-auto" id="info-panel">
            <div id="strategy-info" class="space-y-6">
                <!-- Content injected via JS -->
            </div>
        </div>
        
        <div class="p-4 border-t border-gray-800 flex items-center justify-between">
            <button id="btn-animate" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-xs font-bold transition-all flex items-center">
                <span class="mr-2">▶</span> PLAY FLOW
            </button>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">
                Parallelism Visualizer
            </div>
        </div>
    </div>

    <!-- Right Canvas Area -->
    <div id="canvas-container" class="flex-1 bg-slate-900 relative">
        <canvas id="parallelCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('parallelCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        // UI Elements
        const strategyBtns = document.querySelectorAll('.strategy-btn');
        const infoPanel = document.getElementById('strategy-info');
        const btnAnimate = document.getElementById('btn-animate');

        // State
        let currentStrategy = 'data';
        let isAnimating = true;
        let animationFrameId;
        let particles = [];
        let gpuNodes = [];
        let clock = 0;

        const STRATEGY_DATA = {
            data: {
                title: "Data Parallelism",
                desc: "Each GPU holds a <strong>full copy of the model</strong>. The data (batch) is split, so each GPU processes a different subset of data simultaneously.",
                bullets: [
                    "Best for models that fit on one GPU.",
                    "Requires <strong>Gradient Averaging</strong> across all devices at the end of every step.",
                    "Highly efficient scaling for throughput."
                ],
                math: String.raw`\text{Batch}_i = \text{Data} \div \text{num\_gpus}`
            },
            tensor: {
                title: "Tensor Parallelism",
                desc: "A single large operation (like a matrix multiply) is <strong>sharded across GPUs</strong>. No GPU holds the entire weight matrix.",
                bullets: [
                    "Required for massive layers that exceed GPU memory.",
                    "Intense communication: requires <strong>All-Reduce</strong> operations after sharded matmuls.",
                    "Usually used within a single server node (fast NVLink)."
                ],
                math: String.raw`Y = [X W_1 | X W_2] \cdot W^O`
            },
            pipeline: {
                title: "Pipeline Parallelism",
                desc: "The model layers are split vertically. <strong>GPU 0 has Layer 1-10, GPU 1 has Layer 11-20</strong>, and so on.",
                bullets: [
                    "Data flows sequentially through a chain of GPUs.",
                    "Suffers from <strong>Pipeline Bubbles</strong> (idleness) if not managed properly.",
                    "Uses micro-batching to improve utilization."
                ],
                math: String.raw`x_{n} = \text{Layer}_n(x_{n-1})`
            }
        };

        function resize() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            initGpus();
        }

        window.addEventListener('resize', resize);

        function initGpus() {
            const rect = container.getBoundingClientRect();
            gpuNodes = [];
            const gpuCount = 4;
            const gpuW = 140;
            const gpuH = 180;
            const spacing = (rect.width - (gpuCount * gpuW)) / (gpuCount + 1);

            for (let i = 0; i < gpuCount; i++) {
                gpuNodes.push({
                    id: i,
                    x: spacing + i * (gpuW + spacing) + gpuW/2,
                    y: rect.height / 2,
                    w: gpuW,
                    h: gpuH,
                    load: 0
                });
            }
        }

        function updateUI() {
            const data = STRATEGY_DATA[currentStrategy];
            infoPanel.innerHTML = `
                <div class="space-y-4">
                    <h2 class="text-xl font-bold text-white">${data.title}</h2>
                    <p class="text-sm text-gray-300 leading-relaxed">${data.desc}</p>
                    <ul class="space-y-2">
                        ${data.bullets.map(b => `<li class="text-xs text-gray-400 flex items-start"><span class="text-blue-400 mr-2">•</span>${b}</li>`).join('')}
                    </ul>
                    <div id="math-box" class="mt-6 p-4 bg-slate-900 rounded-lg border border-slate-800"></div>
                </div>
            `;
            const mathBox = document.getElementById('math-box');
            katex.render(data.math, mathBox, { displayMode: true });
        }

        strategyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                strategyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStrategy = btn.id.split('-')[1];
                particles = [];
                updateUI();
            });
        });

        btnAnimate.addEventListener('click', () => {
            isAnimating = !isAnimating;
            btnAnimate.innerHTML = isAnimating ? '<span class="mr-2">■</span> PAUSE FLOW' : '<span class="mr-2">▶</span> PLAY FLOW';
        });

        // --- Drawing Helpers ---

        function drawGpu(gpu, label, sublabel, color) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            
            // Outer Box
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.roundRect(gpu.x - gpu.w/2, gpu.y - gpu.h/2, gpu.w, gpu.h, 12);
            ctx.fill();
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Status Bar
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.roundRect(gpu.x - gpu.w/2 + 10, gpu.y + gpu.h/2 - 25, gpu.w - 20, 10, 5);
            ctx.fill();
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(gpu.x - gpu.w/2 + 10, gpu.y + gpu.h/2 - 25, (gpu.w - 20) * gpu.load, 10, 5);
            ctx.fill();

            // Label
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Inter';
            ctx.textAlign = 'center';
            ctx.fillText(`GPU ${gpu.id}`, gpu.x, gpu.y - gpu.h/2 + 30);
            
            ctx.font = '10px Inter';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('MEMORY', gpu.x, gpu.y + gpu.h/2 - 35);

            // Inner "Content"
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.beginPath();
            ctx.roundRect(gpu.x - gpu.w/2 + 15, gpu.y - 40, gpu.w - 30, 80, 8);
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.3;
            ctx.stroke();
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = color;
            ctx.font = 'bold 12px Inter';
            ctx.fillText(label, gpu.x, gpu.y - 5);
            ctx.font = '10px Inter';
            ctx.fillStyle = '#64748b';
            ctx.fillText(sublabel, gpu.x, gpu.y + 15);
        }

        // --- Particle Systems ---

        function spawnParticles() {
            if (!isAnimating) return;
            const rect = container.getBoundingClientRect();
            
            if (currentStrategy === 'data') {
                if (clock % 30 === 0) {
                    gpuNodes.forEach(gpu => {
                        particles.push({
                            x: gpu.x, y: -20, tx: gpu.x, ty: gpu.y, stage: 0, 
                            color: '#3b82f6', speed: 2 + Math.random(), size: 3
                        });
                    });
                }
            } else if (currentStrategy === 'tensor') {
                if (clock % 40 === 0) {
                    gpuNodes.forEach(gpu => {
                        particles.push({
                            x: gpu.x, y: -20, tx: gpu.x, ty: gpu.y, stage: 0,
                            color: '#10b981', speed: 3, size: 4
                        });
                    });
                }
            } else if (currentStrategy === 'pipeline') {
                if (clock % 60 === 0) {
                    particles.push({
                        x: -20, y: rect.height/2, tx: gpuNodes[0].x, ty: gpuNodes[0].y, 
                        stage: 0, targetGpu: 0, color: '#f43f5e', speed: 4, size: 5
                    });
                }
            }
        }

        function updateParticles() {
            const rect = container.getBoundingClientRect();
            
            particles.forEach((p, idx) => {
                const dx = p.tx - p.x;
                const dy = p.ty - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 5) {
                    if (currentStrategy === 'data') {
                        if (p.stage === 0) {
                            p.stage = 1; p.tx = p.x; p.ty = rect.height + 50;
                        } else {
                            particles.splice(idx, 1);
                        }
                    } else if (currentStrategy === 'tensor') {
                        if (p.stage === 0) {
                            // Sync Phase
                            p.stage = 1;
                            p.tx = rect.width/2;
                            p.ty = rect.height/2 + 150;
                        } else if (p.stage === 1) {
                            p.stage = 2;
                            p.tx = p.x; p.ty = rect.height + 50;
                        } else {
                            particles.splice(idx, 1);
                        }
                    } else if (currentStrategy === 'pipeline') {
                        if (p.targetGpu < gpuNodes.length - 1) {
                            p.targetGpu++;
                            p.tx = gpuNodes[p.targetGpu].x;
                            p.ty = gpuNodes[p.targetGpu].y;
                        } else if (p.stage === 0) {
                            p.stage = 1;
                            p.tx = rect.width + 50;
                        } else {
                            particles.splice(idx, 1);
                        }
                    }
                } else {
                    p.x += (dx/dist) * p.speed;
                    p.y += (dy/dist) * p.speed;
                }
            });
        }

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            clock++;

            spawnParticles();
            updateParticles();

            // Draw GPU Logic
            gpuNodes.forEach(gpu => {
                if (currentStrategy === 'data') {
                    gpu.load = 1.0; // Full model in memory
                    drawGpu(gpu, "FULL MODEL", "Batch Slice", "#3b82f6");
                } else if (currentStrategy === 'tensor') {
                    gpu.load = 0.3; // Sliced memory
                    drawGpu(gpu, `WEIGHT W${gpu.id+1}`, "Tensor Slice", "#10b981");
                } else if (currentStrategy === 'pipeline') {
                    gpu.load = 0.4;
                    drawGpu(gpu, `LAYERS ${gpu.id*10+1}-${(gpu.id+1)*10}`, "Vertical Slice", "#f43f5e");
                }
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Specific Strategy Connectors
            if (currentStrategy === 'tensor') {
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#10b981';
                ctx.globalAlpha = 0.2;
                ctx.beginPath();
                gpuNodes.forEach((g, i) => {
                    if (i < gpuNodes.length - 1) {
                        ctx.moveTo(g.x + g.w/2, g.y);
                        ctx.lineTo(gpuNodes[i+1].x - gpuNodes[i+1].w/2, g.y);
                    }
                });
                ctx.stroke();
                ctx.globalAlpha = 1.0;
                ctx.setLineDash([]);
                
                // Add Sync point label
                ctx.fillStyle = '#10b981';
                ctx.font = '10px Inter';
                ctx.textAlign = 'center';
                ctx.fillText("ALL-REDUCE / SYNC", container.getBoundingClientRect().width/2, container.getBoundingClientRect().height/2 + 130);
            }

            if (currentStrategy === 'pipeline') {
                ctx.strokeStyle = '#f43f5e';
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                gpuNodes.forEach((g, i) => {
                    if (i < gpuNodes.length - 1) {
                        ctx.moveTo(g.x + g.w/2, g.y);
                        ctx.lineTo(gpuNodes[i+1].x - gpuNodes[i+1].w/2, g.y);
                    }
                });
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            animationFrameId = requestAnimationFrame(drawLoop);
        }

        // Init
        updateUI();
        resize();
        drawLoop();
    </script>
</body>
</html>
