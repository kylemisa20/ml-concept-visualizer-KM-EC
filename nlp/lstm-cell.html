<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive LSTM Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@500;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .math { font-family: 'Fira Code', monospace; }
        
        /* SVG Element Styles */
        .wire { stroke: #cbd5e1; stroke-width: 3; fill: none; }
        .wire-c { stroke: #ef4444; stroke-width: 3; fill: none; }
        .wire-h { stroke: #ef4444; stroke-width: 3; fill: none; }
        .wire-x { stroke: #f97316; stroke-width: 3; fill: none; }
        
        .node-gate { fill: #22c55e; stroke: #166534; stroke-width: 2; }
        .node-tanh { fill: #14b8a6; stroke: #0f766e; stroke-width: 2; }
        .node-add { fill: #fef08a; stroke: #ca8a04; stroke-width: 2; }
        .node-mul { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; }
        
        .node-text { font-family: 'Inter', sans-serif; font-weight: bold; fill: #1e293b; font-size: 14px; text-anchor: middle; dominant-baseline: central; pointer-events: none;}
        .node-text-white { fill: white; }

        input[type=range] { accent-color: #6366f1; }

        .matrix-grid {
            display: grid;
            gap: 4px;
        }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-800">
    <div class="max-w-[1900px] mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 flex flex-col h-full lg:h-[90vh]">
        <!-- Header -->
        <div class="bg-slate-900 p-5 text-white shrink-0 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="text-2xl font-bold">LSTM Cell: Inside the Black Box</h1>
                    <p class="text-slate-400 text-sm mt-1">Adjust architecture, weights, and inputs to see the flow.</p>
                </div>
            </div>
            <div class="space-x-2 hidden md:block">
                <button onclick="setPreset('forget')" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-sm transition">Force Forget</button>
                <button onclick="setPreset('remember')" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-sm transition">Force Input</button>
                <button onclick="setPreset('zero')" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-sm transition">Reset</button>
            </div>
        </div>

                    <rect x="370" y="40" width="300" height="480" fill="#dcfce7" fill-opacity="0.4" stroke="#bbf7d0" stroke-width="2" rx="8"/>
                    <text x="520" y="60" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle" class="uppercase tracking-widest">Input Gate</text>

                    <rect x="670" y="40" width="220" height="480" fill="#e0e7ff" fill-opacity="0.4" stroke="#c7d2fe" stroke-width="2" rx="8"/>
                    <text x="780" y="60" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="middle" class="uppercase tracking-widest">Output Gate</text>

                    <path d="M 50 90 L 950 90" class="wire-c" marker-end="url(#arrow-c)"/>

                    <text x="920" y="75" font-size="18" font-weight="bold" fill="#ef4444" class="math">C<tspan dy="5" font-size="12">t</tspan></text>

                    <path d="M 50 380 L 900 380" class="wire-h"/>
                    <text x="80" y="365" font-size="18" font-weight="bold" fill="#ef4444" class="math">H<tspan dy="5" font-size="12">t-1</tspan></text>
                    <text x="920" y="365" font-size="18" font-weight="bold" fill="#ef4444" class="math">H<tspan dy="5" font-size="12">t</tspan></text>

                    <path d="M 430 224 L 430 160 L 464 160" class="wire" marker-end="url(#arrow)"/>
                    <path d="M 530 220 L 530 160 L 496 160" class="wire" marker-end="url(#arrow)"/>
                    <circle cx="480" cy="160" r="16" class="node-mul"/>
                    <text x="480" y="162" class="node-text">×</text>

                    <path d="M 480 144 L 480 106" class="wire" marker-end="url(#arrow)"/>
                    <circle cx="480" cy="90" r="16" class="node-add"/>
                    <text x="480" y="90" class="node-text">+</text>

                    <path d="M 730 460 L 730 360" class="wire-x" marker-end="url(#arrow-x)"/>
                    <path d="M 710 380 L 710 360" class="wire-h" marker-end="url(#arrow-h)"/>
                    <circle cx="720" cy="340" r="16" class="node-add"/>
                    <text x="720" y="340" class="node-text">+</text>
                    <path d="M 720 324 L 720 256" class="wire" marker-end="url(#arrow)"/>
                    <circle cx="720" cy="240" r="16" class="node-gate"/>
                    <text x="720" y="240" class="node-text node-text-white">σ</text>
                    <text x="680" y="240" font-size="14" font-weight="bold" fill="#166534" class="math">o<tspan dy="4" font-size="10">t</tspan></text>

                    <circle cx="830" cy="240" r="20" class="node-tanh"/>

                    <path d="M 736 240 L 764 240" class="wire" marker-end="url(#arrow)"/>
                    <path d="M 810 240 L 796 240" class="wire" marker-end="url(#arrow)"/>
                    <circle cx="780" cy="240" r="16" class="node-mul"/>
                    <text x="780" y="242" class="node-text">×</text>

                    <path d="M 780 256 L 780 380 L 950 380" class="wire-h" marker-end="url(#arrow-h)"/>

                    <g transform="translate(140, 70)"><use href="#val-bg"/><text id="v-ct1" class="math font-bold text-[10px]" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(140, 360)"><use href="#val-bg"/><text id="v-ht1" class="math font-bold text-[10px]" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(230, 520)"><use href="#val-bg"/><text id="v-xt" class="math font-bold text-[10px]" text-anchor="middle" y="4">0</text></g>

                    <text id="stat-ft" x="250" y="180" font-size="10" font-weight="bold" fill="#64748b" text-anchor="middle" class="tracking-wider">--</text>
                    <g transform="translate(250, 200)"><use href="#val-bg"/><text id="v-ft" class="math font-bold text-[10px] fill-green-700" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(330, 70)"><use href="#val-bg"/><text id="v-cf" class="math font-bold text-[10px]" text-anchor="middle" y="4">0</text></g>

                    <text id="stat-it" x="430" y="180" font-size="10" font-weight="bold" fill="#64748b" text-anchor="middle" class="tracking-wider">--</text>
                    <g transform="translate(430, 200)"><use href="#val-bg"/><text id="v-it" class="math font-bold text-[10px] fill-green-700" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(540, 200)"><use href="#val-bg"/><text id="v-c_tilde" class="math font-bold text-[10px] fill-teal-700" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(480, 140)"><use href="#val-bg"/><text id="v-i_c" class="math font-bold text-[10px]" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(560, 70)"><use href="#val-bg"/><text id="v-ct" class="math font-bold text-[10px] fill-red-600" text-anchor="middle" y="4">0</text></g>

                    <text id="stat-ot" x="720" y="180" font-size="10" font-weight="bold" fill="#64748b" text-anchor="middle" class="tracking-wider">--</text>
                    <g transform="translate(720, 200)"><use href="#val-bg"/><text id="v-ot" class="math font-bold text-[10px] fill-green-700" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(830, 275)"><use href="#val-bg"/><text id="v-tanh_ct" class="math font-bold text-[10px] fill-teal-700" text-anchor="middle" y="4">0</text></g>
                    <g transform="translate(860, 380)"><use href="#val-bg"/><text id="v-ht" class="math font-bold text-[10px] fill-red-600" text-anchor="middle" y="4">0</text></g>

                    <g fill="#64748b" font-size="12" font-weight="bold" class="math">
                        <text x="235" y="420" text-anchor="end">W<tspan dy="2" font-size="9">f</tspan></text>
                        <text x="265" y="420" text-anchor="start">U<tspan dy="2" font-size="9">f</tspan></text>
                        <text x="415" y="420" text-anchor="end">W<tspan dy="2" font-size="9">i</tspan></text>
                        <text x="445" y="420" text-anchor="start">U<tspan dy="2" font-size="9">i</tspan></text>
                        <text x="515" y="420" text-anchor="end">W<tspan dy="2" font-size="9">c</tspan></text>
                        <text x="545" y="420" text-anchor="start">U<tspan dy="2" font-size="9">c</tspan></text>
                        <text x="705" y="420" text-anchor="end">W<tspan dy="2" font-size="9">o</tspan></text>
                        <text x="735" y="420" text-anchor="start">U<tspan dy="2" font-size="9">o</tspan></text>

            <!-- Right: Control Panel -->
            <div class="lg:w-[320px] lg:flex-none bg-white overflow-y-auto border-l border-slate-200 flex flex-col min-w-[320px]">
                <!-- NEW: Dimension Configuration -->
                <div class="p-5 border-b border-slate-100 bg-slate-50 sticky top-0 z-20">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">0. Architecture Config</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Input Size (d_in)</label>
                            <select id="sel-din" onchange="setArch()" class="w-full text-xs p-1.5 border rounded bg-white font-bold">
                                <option value="1">1 (Scalar)</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Hidden Size (d_hid)</label>
                            <select id="sel-dhid" onchange="setArch()" class="w-full text-xs p-1.5 border rounded bg-white font-bold">
                                <option value="1">1 (Scalar)</option>
                                <option value="2" selected>2</option>
                                <option value="3">3</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="p-5 border-b border-slate-100 bg-white">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">1. Current State (Inputs)</h2>
                    <div id="input-controls" class="space-y-3">
                        <!-- Inputs dynamically generated -->
                    </div>
                </div>

                <div class="p-5 border-b border-slate-100 bg-slate-800 text-white shadow-inner">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Live Interpretation
                    </h2>
                    <p id="live-interp" class="text-sm leading-relaxed text-slate-200">
                        Adjust parameters to see interpretation.
                    </p>
                </div>

                <div class="p-5 flex-1 space-y-6 bg-slate-50/30">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">2. Gate Weights</h2>
                    <div id="weight-controls" class="space-y-6">
                        <!-- Weight controls dynamically generated -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let d_in = 3;
        let d_hid = 2;

        let state = {
            xt: [1.0, 0.5, -0.2],
            ht1: [0.5, -0.2],
            ct1: [2.0, 1.0],
            weights: {} // Initialized in setArch
        };

        function setArch() {
            d_in = parseInt(document.getElementById('sel-din').value);
            d_hid = parseInt(document.getElementById('sel-dhid').value);

            // Resize Input Vectors
            state.xt = new Array(d_in).fill(0).map((_, i) => state.xt[i] || 0.1);
            state.ht1 = new Array(d_hid).fill(0).map((_, i) => state.ht1[i] || 0.1);
            state.ct1 = new Array(d_hid).fill(0).map((_, i) => state.ct1[i] || 0.1);

            // Re-initialize Weights
            // W is d_hid x d_hid (Recurrent)
            // U is d_hid x d_in  (Input)
            ['f', 'i', 'c', 'o'].forEach(g => {
                const wKey = `w${g}`;
                const uKey = `u${g}`;
                
                // Initialize W (Identity-ish)
                state.weights[wKey] = Array.from({length: d_hid}, (_, r) => 
                    Array.from({length: d_hid}, (_, c) => (r === c ? 1.0 : 0.0))
                );
                
                // Initialize U (Diagonal-ish)
                state.weights[uKey] = Array.from({length: d_hid}, (_, r) => 
                    Array.from({length: d_in}, (_, c) => (r === c ? 1.0 : 0.0))
                );
            });

            renderControls();
            updateValues();
        }

        function renderControls() {
            const inputContainer = document.getElementById('input-controls');
            const weightContainer = document.getElementById('weight-controls');
            inputContainer.innerHTML = '';
            weightContainer.innerHTML = '';

            // 1. Render Input Vectors
            [['xt', 'x', 'orange'], ['ht1', 'H', 'red'], ['ct1', 'C', 'red']].forEach(([id, label, color]) => {
                const vec = state[id];
                const group = document.createElement('div');
                group.className = "space-y-2 border-l-2 border-slate-200 pl-3 py-1";
                const sub = id.includes('1') ? '<sub>t-1</sub>' : '<sub>t</sub>';
                group.innerHTML = `<div class="text-[10px] font-bold text-slate-400 uppercase mb-1">${label}${sub} Vector</div>`;
                
                vec.forEach((val, i) => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3";
                    div.innerHTML = `
                        <label class="w-8 text-[11px] font-bold text-${color}-500 math">${label}<sub>${i+1}</sub></label>
                        <input type="range" min="-5" max="5" step="0.1" value="${val}" class="flex-1 h-1.5 bg-slate-200 rounded appearance-none cursor-pointer" oninput="state.${id}[${i}] = parseFloat(this.value); updateValues(); this.nextElementSibling.innerText = parseFloat(this.value).toFixed(1)">
                        <span class="w-8 text-right text-[10px] font-mono text-slate-500">${val.toFixed(1)}</span>
                    `;
                    group.appendChild(div);
                });
                inputContainer.appendChild(group);
            });

            // 2. Render Weight Matrices
            const gates = [
                { id: 'f', label: 'Forget', math: 'f', color: 'amber' },
                { id: 'i', label: 'Input i', math: 'i', color: 'green' },
                { id: 'c', label: 'Candidate C̃', math: 'c', color: 'teal' },
                { id: 'o', label: 'Output', math: 'o', color: 'indigo' }
            ];

            gates.forEach(gate => {
                const card = document.createElement('div');
                card.className = `p-4 bg-${gate.color}-50/50 rounded-xl border border-${gate.color}-100`;
                
                card.innerHTML = `
                    <h3 class="text-sm font-bold text-${gate.color}-700 mb-2">${gate.label} Gate</h3>
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">W (Recurrent) <span class="math text-[9px] text-slate-300 font-normal">ℝ<sup>${d_hid}x${d_hid}</sup></span></span>
                            <div class="matrix-grid" style="grid-template-columns: repeat(${d_hid}, 1fr)" id="grid-w-${gate.id}"></div>
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">U (Input) <span class="math text-[9px] text-slate-300 font-normal">ℝ<sup>${d_hid}x${d_in}</sup></span></span>
                            <div class="matrix-grid" style="grid-template-columns: repeat(${d_in}, 1fr)" id="grid-u-${gate.id}"></div>
                        </div>
                    </div>
                `;
                weightContainer.appendChild(card);

                // Populate W Grid
                const wGrid = card.querySelector(`#grid-w-${gate.id}`);
                for(let r=0; r<d_hid; r++) {
                    for(let c=0; c<d_hid; c++) {
                        wGrid.appendChild(createSlider('w'+gate.id, r, c));
                    }
                }

                // Populate U Grid
                const uGrid = card.querySelector(`#grid-u-${gate.id}`);
                for(let r=0; r<d_hid; r++) {
                    for(let c=0; c<d_in; c++) {
                        uGrid.appendChild(createSlider('u'+gate.id, r, c));
                    }
                }
            });
        }

        function createSlider(weightId, r, c) {
            const val = state.weights[weightId][r][c];
            const div = document.createElement('div');
            div.className = "flex flex-col gap-0.5";
            div.innerHTML = `
                <div class="flex justify-between items-center px-0.5"><span class="text-[8px] font-bold math opacity-50">${weightId[0].toUpperCase()}${r+1},${c+1}</span><span class="text-[8px] font-mono">${val.toFixed(1)}</span></div>
                <input type="range" min="-3" max="3" step="0.1" value="${val}" class="w-full h-1 bg-slate-200 rounded appearance-none cursor-pointer" oninput="state.weights.${weightId}[${r}][${c}] = parseFloat(this.value); updateValues(); this.previousElementSibling.lastElementChild.innerText = parseFloat(this.value).toFixed(1)">
            `;
            return div;
        }

        function sigmoid(z) { return 1 / (1 + Math.exp(-z)); }

        function dot(matrix, vector) {
            let res = new Array(matrix.length).fill(0);
            for(let r=0; r<matrix.length; r++) {
                for(let c=0; c<vector.length; c++) {
                    res[r] += matrix[r][c] * vector[c];
                }
            }
            return res;
        }

        function add(v1, v2) { return v1.map((v, i) => v + v2[i]); }
        function mul(v1, v2) { return v1.map((v, i) => v * v2[i]); }
        function apply(v, fn) { 
            if(fn === 'sig') return v.map(sigmoid);
            if(fn === 'tanh') return v.map(Math.tanh);
            return v;
        }

        function format(v) {
            if(v.length === 1) return v[0].toFixed(2);
            return `[${v.map(n => n.toFixed(2)).join(', ')}]`;
        }

        function updateValues() {
            const { xt, ht1, ct1, weights } = state;

            // Gates Math
            const f_raw = add(dot(weights.wf, ht1), dot(weights.uf, xt));
            const ft = apply(f_raw, 'sig');
            const cf = mul(ft, ct1);

            const i_raw = add(dot(weights.wi, ht1), dot(weights.ui, xt));
            const it = apply(i_raw, 'sig');
            
            const c_raw = add(dot(weights.wc, ht1), dot(weights.uc, xt));
            const c_tilde = apply(c_raw, 'tanh');
            const ic = mul(it, c_tilde);

            const ct = add(cf, ic);

            const o_raw = add(dot(weights.wo, ht1), dot(weights.uo, xt));
            const ot = apply(o_raw, 'sig');
            const tanh_ct = apply(ct, 'tanh');
            const ht = mul(ot, tanh_ct);

            // Update SVG Texts
            const ids = ['xt', 'ht1', 'ct1', 'ft', 'cf', 'it', 'c_tilde', 'i_c', 'ct', 'ot', 'tanh_ct', 'ht'];
            const vals = [xt, ht1, ct1, ft, cf, it, c_tilde, ic, ct, ot, tanh_ct, ht];
            ids.forEach((id, i) => document.getElementById(`v-${id}`).textContent = format(vals[i]));

            // Visual Status
            const avg = v => v.reduce((a,b)=>a+b,0) / v.length;
            const status = (val) => val < 0.2 ? 'ERASING' : (val > 0.8 ? 'KEEPING' : 'MIXING');
            const color = (val) => val < 0.2 ? '#ef4444' : (val > 0.8 ? '#16a34a' : '#ca8a04');

            [['ft', ft], ['it', it], ['ot', ot]].forEach(([id, v]) => {
                const el = document.getElementById(`stat-${id}`);
                const score = avg(v);
                el.textContent = status(score);
                el.style.fill = color(score);
            });

            // Live Interp
            document.getElementById('live-interp').innerHTML = `
                Arch: <b class="text-blue-400">d_in=${d_in}, d_hid=${d_hid}</b>.<br><br>
                Weights are now matrices: <br>
                U matrices are <b class="text-orange-400">${d_hid}x${d_in}</b> (Input).<br>
                W matrices are <b class="text-red-400">${d_hid}x${d_hid}</b> (Recurrent).<br><br>
                The Hidden State vector is size ${d_hid}.
            `;
        }

        function setPreset(type) {
            if(type === 'forget') {
                ['f'].forEach(g => {
                    state.weights[`w${g}`] = state.weights[`w${g}`].map(r => r.fill(-5));
                    state.weights[`u${g}`] = state.weights[`u${g}`].map(r => r.fill(-5));
                });
            } else if (type === 'remember') {
                ['i'].forEach(g => {
                    state.weights[`w${g}`] = state.weights[`w${g}`].map(r => r.fill(5));
                    state.weights[`u${g}`] = state.weights[`u${g}`].map(r => r.fill(5));
                });
            } else if (type === 'zero') {
                location.reload();
            }
            renderControls();
            updateValues();
        }

        // Init
        setArch();
    </script>
</body>
</html>
