<!doctype html>
<!-- Brief: Visualization of convolution output-size formulas with stride and padding. -->
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNN Convolution Visualizer</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel CDN for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap");

        body {
            font-family: "Inter", sans-serif;
        }

        .font-mono {
            font-family: "JetBrains+Mono", monospace;
        }

        /* Custom slider styling for better cross-browser look */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

      // Inline SVG Components for Lucide Icons
      const IconSettings = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      );
      const IconHelp = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      );
      const IconExpand = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="m15 3 6 6-6 6" />
          <path d="M9 21 3 15l6-6" />
          <path d="M21 9H3" />
          <path d="M21 15H3" />
        </svg>
      );
      const IconLayout = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
          <line x1="3" y1="9" x2="21" y2="9" />
          <line x1="9" y1="21" x2="9" y2="9" />
        </svg>
      );
      const IconChevron = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="1"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      );
      const IconMove = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <polyline points="5 9 2 12 5 15" />
          <polyline points="9 5 12 2 15 5" />
          <polyline points="15 19 12 22 9 19" />
          <polyline points="19 9 22 12 19 15" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <line x1="12" y1="2" x2="12" y2="22" />
        </svg>
      );
      const IconRotate = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      );
      const IconPlay = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
      );

      const App = () => {
        const [inputSize, setInputSize] = useState(5);
        const [kernelSize, setKernelSize] = useState(3);
        const [stride, setStride] = useState(1);
        const [padding, setPadding] = useState(0);
        const [stepIndex, setStepIndex] = useState(0);

        // Using the formula from your reference image: (Input - Filter + Stride + 2*Padding) / Stride
        const numerator = inputSize - kernelSize + stride + 2 * padding;
        const outputSizeRaw = numerator / stride;
        const outputSize = Math.floor(outputSizeRaw);
        const isValid = Number.isInteger(outputSizeRaw) && outputSizeRaw > 0;
        const totalSteps =
          isValid && outputSize > 0 ? outputSize * outputSize : 0;

        const paddedSize = inputSize + 2 * padding;
        const paddedGrid = useMemo(
          () => Array.from({ length: paddedSize }),
          [paddedSize],
        );
        const outputGrid = useMemo(
          () => Array.from({ length: Math.max(0, outputSize) }),
          [outputSize],
        );

        // Reset interaction when parameters change
        useEffect(() => {
          setStepIndex(0);
        }, [inputSize, kernelSize, stride, padding]);

        const currentStepX = stepIndex % outputSize;
        const currentStepY = Math.floor(stepIndex / outputSize);

        const handleNext = () => {
          if (stepIndex < totalSteps - 1) {
            setStepIndex((prev) => prev + 1);
          }
        };

        const handleReset = () => {
          setStepIndex(0);
        };

        return (
          <div className="min-h-screen p-4 md:p-8 text-slate-800">
            <div className="max-w-6xl mx-auto">
              <header className="mb-8 text-center">
                <h1 className="text-3xl font-bold text-slate-900 mb-2">
                  CNN Convolution Visualizer
                </h1>
                <p className="text-slate-600">
                  Interact with the formula from your reference images.
                </p>
              </header>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                  <div className="flex items-center gap-2 mb-6 text-indigo-600 font-semibold uppercase text-xs tracking-wider">
                    <IconSettings />
                    <span>Parameters</span>
                  </div>

                  <div className="space-y-6">
                    <div>
                      <label className="text-sm font-medium block mb-2">
                        Input Size (W): {inputSize}
                      </label>
                      <input
                        type="range"
                        min="1"
                        max="10"
                        step="1"
                        value={inputSize}
                        onChange={(e) => setInputSize(parseInt(e.target.value))}
                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                      />
                    </div>
                    <div>
                      <label className="text-sm font-medium block mb-2">
                        Kernel Size (K): {kernelSize}
                      </label>
                      <input
                        type="range"
                        min="1"
                        max={Math.min(inputSize + 2 * padding, 5)}
                        step="1"
                        value={kernelSize}
                        onChange={(e) =>
                          setKernelSize(parseInt(e.target.value))
                        }
                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                      />
                    </div>
                    <div>
                      <label className="text-sm font-medium block mb-2">
                        Stride (S): {stride}
                      </label>
                      <input
                        type="range"
                        min="1"
                        max="3"
                        step="1"
                        value={stride}
                        onChange={(e) => setStride(parseInt(e.target.value))}
                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                      />
                    </div>
                    <div>
                      <label className="text-sm font-medium block mb-2">
                        Padding (P): {padding}
                      </label>
                      <input
                        type="range"
                        min="0"
                        max="3"
                        step="1"
                        value={padding}
                        onChange={(e) => setPadding(parseInt(e.target.value))}
                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                      />
                    </div>
                  </div>

                  <div className="mt-8 pt-6 border-t border-slate-100">
                    <div className="flex items-center gap-2 mb-4 text-slate-500 font-semibold uppercase text-xs tracking-wider">
                      <IconHelp />
                      <span>Legend</span>
                    </div>
                    <ul className="text-xs text-slate-500 space-y-2">
                      <li>
                        • <b>W:</b> Input Feature Map size.
                      </li>
                      <li>
                        • <b>K:</b> Filter (Kernel) size.
                      </li>
                      <li>
                        • <b>S:</b> Stride.
                      </li>
                      <li>
                        • <b>P:</b> Padding.
                      </li>
                    </ul>
                  </div>
                </div>

                <div className="lg:col-span-2 space-y-6">
                  <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <h2 className="text-lg font-semibold mb-6 italic">
                      Output Feature Map Formula
                    </h2>
                    <div className="flex flex-col items-center">
                      <div className="text-xl md:text-2xl font-serif text-slate-900 mb-6 flex items-center gap-3">
                        <span>O =</span>
                        <div className="flex flex-col items-center">
                          <span className="border-b-2 border-slate-800 px-4 whitespace-nowrap">
                            Input - Filter + Stride + 2 &times; padding
                          </span>
                          <span>Stride</span>
                        </div>
                      </div>

                      <div className="bg-indigo-50 px-8 py-6 rounded-2xl border border-indigo-100 shadow-inner">
                        <div className="text-2xl font-mono text-indigo-700 font-bold">
                          ({inputSize} - {kernelSize} + {stride} + 2 &times;{" "}
                          {padding}) / {stride} ={" "}
                          {isValid ? outputSize : outputSizeRaw.toFixed(2)}
                        </div>
                      </div>

                      {!isValid && (
                        <div className="mt-4 px-4 py-2 bg-amber-50 text-amber-700 text-xs rounded-lg border border-amber-200 font-medium">
                          ⚠ Stride alignment issue: Output is floored to{" "}
                          {outputSize}
                        </div>
                      )}

                      {/* Animation Controls */}
                      <div className="mt-8 flex gap-4">
                        <button
                          onClick={handleReset}
                          className="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-lg transition-colors border border-slate-200"
                        >
                          <IconRotate />
                          Reset
                        </button>
                        <button
                          onClick={handleNext}
                          disabled={stepIndex >= totalSteps - 1 || !isValid}
                          className={`flex items-center gap-2 px-6 py-2 font-semibold rounded-lg transition-all shadow-sm
                                                    ${
                                                      stepIndex >=
                                                        totalSteps - 1 ||
                                                      !isValid
                                                        ? "bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200"
                                                        : "bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-200"
                                                    }`}
                        >
                          <IconPlay />
                          Next Step ({stepIndex + 1}/{totalSteps})
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div className="flex flex-col md:flex-row items-center justify-center gap-10">
                      <div className="flex flex-col items-center">
                        <h3 className="text-xs font-bold uppercase text-slate-400 mb-4 flex items-center gap-2 tracking-widest">
                          <IconExpand /> Input + Padding
                        </h3>
                        <div
                          className="grid gap-1 p-2 bg-slate-50 rounded-lg border border-slate-100"
                          style={{
                            gridTemplateColumns: `repeat(${paddedSize}, minmax(0, 1fr))`,
                          }}
                        >
                          {paddedGrid.map((_, r) =>
                            paddedGrid.map((_, c) => {
                              const isPadding =
                                r < padding ||
                                r >= inputSize + padding ||
                                c < padding ||
                                c >= inputSize + padding;
                              // Calculate active kernel bounds based on current interactive step
                              const activeStartX = currentStepX * stride;
                              const activeStartY = currentStepY * stride;
                              const isKernelActive =
                                r >= activeStartY &&
                                r < activeStartY + kernelSize &&
                                c >= activeStartX &&
                                c < activeStartX + kernelSize;

                              return (
                                <div
                                  key={`p-${r}-${c}`}
                                  className={`w-6 h-6 md:w-8 md:h-8 border rounded-sm flex items-center justify-center text-[10px] transition-all duration-200
                                                                ${isPadding ? "bg-slate-200 border-slate-300 text-slate-500 border-dashed" : "bg-white border-slate-200"}
                                                                ${isKernelActive ? "ring-2 ring-indigo-500 ring-inset bg-indigo-100 z-10" : ""}`}
                                >
                                  {isPadding ? "0" : ""}
                                </div>
                              );
                            }),
                          )}
                        </div>
                      </div>

                      <div className="hidden md:block text-slate-300">
                        <IconChevron />
                      </div>

                      <div className="flex flex-col items-center">
                        <h3 className="text-xs font-bold uppercase text-slate-400 mb-4 flex items-center gap-2 tracking-widest">
                          <IconLayout /> Output Feature Map
                        </h3>
                        {isValid && outputSize > 0 ? (
                          <div
                            className="grid gap-1 p-2 bg-slate-50 rounded-lg border border-slate-100"
                            style={{
                              gridTemplateColumns: `repeat(${outputSize}, minmax(0, 1fr))`,
                            }}
                          >
                            {outputGrid.map((_, r) =>
                              outputGrid.map((_, c) => {
                                const isCurrentlyComputed =
                                  r === currentStepY && c === currentStepX;
                                const isComputedBefore =
                                  r * outputSize + c < stepIndex;

                                return (
                                  <div
                                    key={`o-${r}-${c}`}
                                    className={`w-6 h-6 md:w-8 md:h-8 border border-indigo-400 rounded-sm flex items-center justify-center transition-all duration-200 
                                                                    ${
                                                                      isCurrentlyComputed
                                                                        ? "ring-4 ring-indigo-300 scale-110 shadow-md bg-indigo-600"
                                                                        : isComputedBefore
                                                                          ? "bg-indigo-400 opacity-90"
                                                                          : "bg-transparent opacity-20"
                                                                    }`}
                                  ></div>
                                );
                              }),
                            )}
                          </div>
                        ) : (
                          <div className="w-32 h-32 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl text-slate-400 bg-slate-50">
                            <span className="text-[10px] font-bold">
                              INVALID
                            </span>
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="mt-8 flex justify-center flex-wrap gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                      <div className="flex items-center gap-1.5">
                        <div className="w-3 h-3 bg-white border border-slate-200"></div>
                        Pixel
                      </div>
                      <div className="flex items-center gap-1.5">
                        <div className="w-3 h-3 bg-slate-200 border border-slate-300 border-dashed"></div>
                        Padding
                      </div>
                      <div className="flex items-center gap-1.5">
                        <div className="w-3 h-3 bg-indigo-100 ring-1 ring-indigo-500"></div>
                        Active Filter
                      </div>
                      <div className="flex items-center gap-1.5">
                        <div className="w-3 h-3 bg-indigo-600"></div>Active
                        Output
                      </div>
                    </div>
                  </div>

                  <div className="bg-indigo-900 text-indigo-100 p-6 rounded-2xl shadow-xl flex gap-4">
                    <div className="shrink-0 p-3 bg-indigo-800 rounded-xl h-fit">
                      <IconMove />
                    </div>
                    <div>
                      <h3 className="font-bold mb-1 text-lg italic tracking-tight">
                        Algebraic Equivalence
                      </h3>
                      <p className="text-sm opacity-80 leading-relaxed">
                        The formula <b>(W - K + S + 2P) / S</b> is the same as{" "}
                        <b>(W - K + 2P) / S + 1</b>.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
</body>

</html>
